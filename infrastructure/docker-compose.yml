services:
# Main Database
  postgres:
    image: postgres:16-alpine
    container_name: sentinel-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
# Message Broker
  redis:
    image: redis:7-alpine
    container_name: sentinel-broker
    ports:
      - "6379:6379"
# MLOps Tracker
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.11.3
    container_name: sentinel-mlflow
    ports:
      - "5000:5000"
    command: mlflow server --host 0.0.0.0
# Python Microservice
  python-producer:
    build: 
      context: ../python-producer
    container_name: sentinel-python
    depends_on:
      - redis
      - postgres
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379

volumes:
  postgres_data: